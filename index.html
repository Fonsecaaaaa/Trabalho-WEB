<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio da Bandeira</title>
    <style>
        /* Estilização Geral */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background-color: #2b2b36;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #4caf50;
            margin-bottom: 20px;
        }

        /* Área dos Desafios */
        #challenge-section {
            display: block;
        }

        p#question {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 1rem;
            border: 2px solid #4caf50;
            border-radius: 6px;
            background-color: #1e1e24;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            color: #fff;
            background-color: #4caf50;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: #45a049;
        }

        p#message {
            margin-top: 15px;
            height: 20px;
            color: #ff5252;
            font-weight: bold;
        }

        /* Web Art da Bandeira (Inicialmente oculta) */
        #flag-section {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .flag {
            width: 300px;
            height: 200px;
            background-color: #009c3b; /* Verde */
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
        }

        .rhombus {
            width: 240px;
            height: 150px;
            background-color: #ffdf00; /* Amarelo */
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            width: 100px;
            height: 100px;
            background-color: #002776; /* Azul */
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        .band {
            width: 120px;
            height: 15px;
            background-color: #fff; /* Branco */
            position: absolute;
            top: 40px;
            left: -10px;
            transform: rotate(-10deg);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="challenge-section">
            <h1>Libere a Arte</h1>
            <p id="question">Carregando desafio...</p>
            <input type="text" id="answer" placeholder="Digite sua resposta aqui..." autocomplete="off">
            <br>
            <button onclick="checkAnswer()">Enviar Resposta</button>
            <p id="message"></p>
        </div>

        <div id="flag-section">
            <h1>Parabéns!</h1>
            <p>Você concluiu os desafios. Aqui está a sua Web Art!</p>
            <div class="flag">
                <div class="rhombus">
                    <div class="circle">
                        <div class="band"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lista de desafios
        const challenges = [
            { 
                question: "Desafio 1/3: No basquete, quantos pontos vale um arremesso de lance livre?", 
                answer: "1" 
            },
            { 
                question: "Desafio 2/3: Qual é a tag HTML fundamental usada para criar um hiperlink? (Escreva apenas a letra da tag, sem os sinais <>)", 
                answer: "a" 
            },
            { 
                question: "Desafio 3/3: Qual é a capital do Brasil?", 
                answer: "brasilia" 
            }
        ];

        let currentChallengeIndex = 0;

        const questionEl = document.getElementById('question');
        const answerInput = document.getElementById('answer');
        const messageEl = document.getElementById('message');
        const challengeSection = document.getElementById('challenge-section');
        const flagSection = document.getElementById('flag-section');

        // Carrega a primeira pergunta
        function loadChallenge() {
            questionEl.textContent = challenges[currentChallengeIndex].question;
            answerInput.value = '';
            messageEl.textContent = '';
            answerInput.focus();
        }

        // Verifica a resposta
        function checkAnswer() {
            // Normaliza a resposta (remove acentos e deixa minúsculo) para evitar erros de digitação
            let userAnswer = answerInput.value
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .trim();
            
            let correctAnswer = challenges[currentChallengeIndex].answer;

            if (userAnswer === correctAnswer) {
                currentChallengeIndex++;
                
                if (currentChallengeIndex < challenges.length) {
                    loadChallenge();
                } else {
                    showFlag();
                }
            } else {
                messageEl.textContent = "Resposta incorreta. Tente novamente!";
                answerInput.value = '';
            }
        }

        // Permite enviar com a tecla Enter
        answerInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkAnswer();
            }
        });

        // Mostra a arte final
        function showFlag() {
            challengeSection.style.display = 'none';
            flagSection.style.display = 'flex';
        }

        // Inicia o jogo
        loadChallenge();
    </script>
</body>
</html>
